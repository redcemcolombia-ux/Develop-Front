<div class="card platform-card">
  <div
    class="card-header platform-card__header platform-card__header--warning d-flex justify-content-between align-items-center"
    style="background-color: #ffc107; color: #212529"
  >
    <h5 class="mb-0">Formulario Notificación</h5>
  </div>

  <div class="card-body p-4">
    <div class="row g-4">
      <div class="col-12">
        <label class="form-label fw-bold">
          Asunto <span class="text-danger">*</span>
        </label>
        <input
          type="text"
          class="form-control form-control-lg"
          placeholder="Escribe un asunto claro y conciso"
          required
          [(ngModel)]="notificacion.asunto"
        />
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">
          Mensaje <span class="text-danger">*</span>
        </label>
        <textarea
          class="form-control form-control-lg"
          rows="6"
          placeholder="Redacta el mensaje de la notificación"
          required
          [(ngModel)]="notificacion.mensaje"
        ></textarea>
      </div>

      <div class="col-12">
        <label class="form-label fw-bold">
          Adjunto (PDF) <span class="text-danger">*</span>
        </label>

        <div class="upload-dropzone border rounded p-4 text-center" (click)="fileInput.click()" style="cursor: pointer">
          <div>
            <p class="mt-2 mb-0 text-muted">
              {{ adjuntoPdf ? 'Haz clic para cambiar el archivo' : 'Haz clic para seleccionar un archivo PDF' }}
            </p>
            <div *ngIf="adjuntoPdf" class="mt-3">
              <span class="badge bg-secondary">{{ adjuntoPdf.name }}</span>
              <button
                type="button"
                class="btn btn-sm btn-outline-danger ms-2"
                (click)="removerAdjunto(); $event.stopPropagation()"
              >
                Quitar
              </button>
            </div>
          </div>
          <input
            #fileInput
            type="file"
            class="d-none"
            accept="application/pdf"
            (change)="onAdjuntoSelected($event)"
          />
        </div>

        <div *ngIf="adjuntoPdfSafeUrl" class="mt-3">
          <div class="card">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
              <span>Vista previa del PDF</span>
              <button type="button" class="btn btn-outline-primary btn-sm" (click)="verPDF()">Ver PDF</button>
            </div>
            <div class="card-body p-0">
              <iframe
                [src]="adjuntoPdfSafeUrl"
                type="application/pdf"
                style="width: 100%; height: 400px; border: none"
              ></iframe>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-light btn-lg" (click)="limpiar()">Limpiar</button>
        <button
          type="button"
          class="btn btn-primary btn-lg"
          [disabled]="!notificacion.asunto || !notificacion.mensaje || !adjuntoPdf || enviando"
          (click)="enviar()"
        >
          {{ enviando ? 'Enviando...' : 'Enviar Notificación' }}
        </button>
      </div>
    </div>
  </div>
</div>
